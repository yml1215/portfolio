<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YUMI LEE</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="layout">
    <div class="guide-grid" aria-hidden="true"></div>
    <svg class="line-layer zoom-target" aria-hidden="true">
      <line class="connect-line line-1"></line>
      <line class="connect-line line-2"></line>
      <line class="connect-line line-3"></line>
      <line class="connect-line line-4"></line>
    </svg>
    <div class="corner-labels zoom-target">
      <span class="corner-label brand">BRAND</span>
      <span class="corner-label object">OBJECT</span>
      <span class="corner-label experience">EXPERIENCE</span>
      <span class="corner-label material">MATERIAL</span>
    </div>
    <a class="selected-works-btn zoom-target" href="material.html">SEE SELECTED WORKS</a>
    <button class="question-btn" type="button" aria-label="Question">
      <img src="qudstionmark.png" alt="" />
    </button>
    <div class="dots zoom-target">
      <div class="dot16"></div>
      <div class="dot16"></div>
      <div class="dot16"></div>
      <div class="dot16"></div>
      <p class="name-label" aria-live="off">
        <span class="name-initial">YUMI LEE</span>
        <span class="name-next">DESIGNER<br>WORKING ACROSS<br> GRAPHIC<br> &amp; MATERIAL</span>
      </p>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
