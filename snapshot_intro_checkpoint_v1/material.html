<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textile & Material</title>
  <link rel="stylesheet" href="detail.css">
</head>
<body class="page-material">
  <div class="frame-top" aria-hidden="true">
    <p class="kicker"></p>
  </div>
  <div class="frame-left" aria-hidden="true"></div>
  <div class="frame-right" aria-hidden="true"></div>
  <div class="frame-bottom" aria-hidden="true"></div>
  <div class="frame-dot" aria-hidden="true"></div>
  <h2 class="category-title category-fixed">Textile &amp; Material</h2>

  <main class="page">
    <section class="panel panel--text">
      <div class="panel-text-scroll">
        <ul class="project-list" aria-label="Textile and material projects">
          <li class="project-item is-open">
            <button
              class="project-trigger"
              type="button"
              aria-expanded="true"
              data-image="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1600&q=80"
              data-alt="2024 Chanel 2024/25 FW Ready-to-Wear"
            >
              <span class="project-year">2024</span>
              <span class="project-name">Chanel 2024/25 FW Ready-to-Wear</span>
            </button>
            <div class="project-panel">
              <p class="detail-copy">Material direction and textile execution for runway presentation contexts.</p>
            </div>
          </li>
          <li class="project-item">
            <button
              class="project-trigger"
              type="button"
              aria-expanded="false"
              data-image="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&w=1600&q=80"
              data-alt="Surface experiments"
            >
              <span class="project-year">2023</span>
              <span class="project-name">Surface experiments</span>
            </button>
            <div class="project-panel">
              <p class="detail-copy">Ongoing explorations on surface, print, and material behavior across physical outputs.</p>
            </div>
          </li>
        </ul>
      </div>
    </section>

    <section class="panel panel--media">
      <div class="media-block">
        <img class="media-image" data-project-media src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1600&q=80" alt="2024 Chanel 2024/25 FW Ready-to-Wear" />
      </div>
    </section>
  </main>
  <script src="detail-accordion.js"></script>
</body>
</html>
