<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exhibition & Spatial Experience</title>
  <link rel="stylesheet" href="detail.css">
</head>
<body class="page-experience">
  <div class="frame-top" aria-hidden="true">
    <p class="kicker"></p>
  </div>
  <div class="frame-left" aria-hidden="true"></div>
  <div class="frame-right" aria-hidden="true"></div>
  <div class="frame-bottom" aria-hidden="true"></div>
  <div class="frame-dot" aria-hidden="true"></div>
  <h2 class="category-title category-fixed">Exhibition &amp; Spatial Experience</h2>

  <main class="page">
    <section class="panel panel--text">
      <div class="panel-text-scroll">
        <ul class="project-list" aria-label="Exhibition and spatial experience projects">
          <li class="project-item is-open">
            <button
              class="project-trigger"
              type="button"
              aria-expanded="true"
              data-image="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1600&q=80"
              data-alt="Christian Dior Designer of Dreams Seoul"
            >
              <span class="project-year">2025</span>
              <span class="project-name">Exhibition Christian Dior: Designer of Dreams - Seoul</span>
            </button>
            <div class="project-panel">
              <p class="detail-copy">Spatial experience planning and execution for the Seoul edition.</p>
            </div>
          </li>
          <li class="project-item">
            <button
              class="project-trigger"
              type="button"
              aria-expanded="false"
              data-image="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1600&q=80"
              data-alt="Christian Dior Designer of Dreams Riyad"
            >
              <span class="project-year">2024</span>
              <span class="project-name">Exhibition Christian Dior: Designer of Dreams - Riyad</span>
            </button>
            <div class="project-panel">
              <p class="detail-copy">Localized adaptation and exhibition flow design for the Riyad edition.</p>
            </div>
          </li>
        </ul>
      </div>
    </section>

    <section class="panel panel--media">
      <div class="media-block">
        <img class="media-image" data-project-media src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1600&q=80" alt="Christian Dior Designer of Dreams Seoul" />
      </div>
    </section>
  </main>
  <script src="detail-accordion.js"></script>
</body>
</html>
